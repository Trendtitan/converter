<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agrinal Vouchers Print</title>
    <style>
        /* Reset and Base Styles */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
        }

        /* Grid Layout for the Page */
        .voucher-grid {
            display: grid;
            /* Adjust columns based on how many fit your page width (e.g., 5 columns) */
            grid-template-columns: repeat(5, 1fr);
            gap: 1px; /* Creates the border lines between vouchers */
            background-color: #ccc; /* Border color */
            max-width: 210mm; /* Standard A4 Width */
            margin: 0 auto;
            background-color: #000; /* Strict black lines for grid */
        }

        /* Individual Voucher Card */
        .voucher-card {
            background-color: #fff;
            box-sizing: border-box;
            padding: 10px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 140px; /* Adjust height to fit your desired layout aspect ratio */
        }

        /* Logo Area */
        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 10px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .logo-icon {
            width: 24px;
            height: 24px;
            margin-bottom: 2px;
            /* Replace with your actual logo asset path or SVG */
            border: 1px dashed #666; 
            border-radius: 50%;
        }

        /* Code Block */
        .code-box {
            border: 1px solid #000;
            padding: 4px 8px;
            font-size: 14px;
            font-weight: bold;
            width: 85%;
            margin: 4px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
        }

        /* Details */
        .details {
            font-size: 11px;
            line-height: 1.3;
        }
        .details .duration {
            font-weight: 500;
        }
        .details .price {
            font-weight: bold;
        }

        /* Footer Note */
        .footer-note {
            font-size: 8px;
            color: #444;
            transform: scale(0.9);
        }

        /* Print Settings optimization */
        @media print {
            body {
                background-color: #fff;
            }
            .voucher-grid {
                max-width: 100%;
                page-break-inside: auto;
            }
            .voucher-card {
                page-break-inside: avoid;
            }
            /* Hide browser headers/footers if necessary */
            @page {
                margin: 10mm;
            }
        }
    </style>
</head>
<body>

    <div class="voucher-grid" id="grid">
        </div>

    <script>
        // Paste your parsed Excel data here (e.g., converted via an online XLSX to JSON tool)
        const vouchersData = [
            { code: "QD8682458", duration: "7 Hours Upgrade", price: "Ugx 1000" },
            { code: "QD6748226", duration: "7 Hours Upgrade", price: "Ugx 1000" },
            { code: "QD6365925", duration: "7 Hours Upgrade", price: "Ugx 1000" },
            // ... Add the rest of your 300 rows here
        ];

        const gridContainer = document.getElementById('grid');

        vouchersData.forEach(item => {
            const card = document.createElement('div');
            card.className = 'voucher-card';
            card.innerHTML = `
                <div class="logo-container">
                    <div class="logo-icon"></div>
                    <div>AGRINAL</div>
                </div>
                <div class="code-box">
                    <span>👤</span> <span>${item.code}</span>
                </div>
                <div class="details">
                    <div class="duration">${item.duration}</div>
                    <div class="price">${item.price}</div>
                </div>
                <div class="footer-note">Keep the ticket during the service</div>
            `;
            gridContainer.appendChild(card);
        });
    </script>
</body>
</html>
